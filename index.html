<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>THE IMPOSSIBLE BUTTON</title>
    <style>
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: monospace;
        }
        #box {
            width: 300px;
            height: 100px;
            border: 1px solid #111;
            background: #050505;
        }
        #btn {
            position: fixed;
            padding: 12px 35px;
            background: transparent;
            color: #00f2fe;
            border: 1px solid #00f2fe;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: transform 0.1s ease-out; /* 增加滑順感 */
            z-index: 9999;
        }
    </style>
</head>
<body>

    <div id="box"></div>
    <button id="btn">傳送</button>

    <script>
        const btn = document.getElementById('btn');
        let btnX = window.innerWidth / 2 - 50;
        let btnY = window.innerHeight - 100;

        // 初始化位置
        btn.style.left = btnX + 'px';
        btn.style.top = btnY + 'px';

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;

            // 計算距離
            const dx = btnX + 50 - mouseX;
            const dy = btnY + 20 - mouseY;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // 逃跑範圍設定為 150 像素
            if (distance < 150) {
                const angle = Math.atan2(dy, dx);
                const force = (150 - distance) / 2; // 距離越近推力越大

                btnX += Math.cos(angle) * force * 5;
                btnY += Math.sin(angle) * force * 5;

                // 邊界傳送邏輯 (像小精靈遊戲一樣穿梭)
                if (btnX < -100) btnX = window.innerWidth;
                if (btnX > window.innerWidth) btnX = -100;
                if (btnY < -50) btnY = window.innerHeight;
                if (btnY > window.innerHeight) btnY = -50;

                btn.style.left = btnX + 'px';
                btn.style.top = btnY + 'px';
            }
        });

        // 最後的惡作劇：即使按到也無效
        btn.addEventListener('mousedown', (e) => {
            e.preventDefault();
            btn.style.opacity = '0';
            setTimeout(() => {
                alert("::系統錯誤:: 檢測到非法點擊。連線已切斷。");
                location.reload(); // 直接重整網頁
            }, 10);
        });
    </script>
</body>
</html>
